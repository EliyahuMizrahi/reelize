services:
  backend:
    build:
      args:
        TORCH_INDEX: https://download.pytorch.org/whl/cu124
        TORCH_SUFFIX: "+cu124"
    environment:
      - AUDIO_DEVICE=cuda
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - TOKENIZERS_PARALLELISM=false
      - PYTHONFAULTHANDLER=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
